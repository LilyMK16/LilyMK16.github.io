		fill("blue")

			for(let j=0; j<20; j++){
				let x = i*50+30
				let y = j*50+130
				let d=dist(x,y,mouseX,mouseY)
				let circleSize = map(j, 0, 20, 10, 100)
				if(d<40){
					fill("blue")
				} else {
					fill("yellow")
				}
				circle(i*50+30,j*50+130,10*i+10)
				if (d<30){
				fill("blue")}
				else {
					fill ("pink")
				}
				circle(i*50+30,j*50+130,circleSize)
				if (d<20){
					fill("blue")
				}
				else{
				fill("lightblue")}

				circle(i*50+30,j*50+130,circleSize/2)
				if (d<10){
				fill("blue")}
				else {
					fill("lightblue")
				}
				circle(i*50+30,j*50+130,circleSize/4)
				if (d<5){
					fill("blue")
				}
				else {
					fill ("yellow")
				}
			}
