<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
</head>
<!-- notes: 
OR is ||
AND is && in Java -->
<body>
<script>
	let xpos
	let ypos
	let xspeed = 5
	let yspeed = 8
	let fillColor = "lightblue"
	function setup(){
		createCanvas(800,800);
		xpos = width/2
		ypos = height/2
	}

	function draw(){
		background("lightpink")
		// if xpos is larger than width OR less than zero, reverse the direction
		//|| is or 
		if(xpos+25 > width || xpos -25 < 0 ){
			//reverse x
			xspeed*=-1
		// if ypos is larger than height OR ypos is less than zero
		}
		if(ypos+25>height || ypos -25 < 0){
			yspeed*=-1
		}

		if (ypos < 200){
			fillColor = "lightblue"
		}

		else{
			if ( ypos <400)
			fillColor = "skyblue"
			else{
				if (ypos<600)
					fillColor ="blue"
				else {
					if (ypos<800)
						fillColor = "darkblue"
				}
			}
		}

		//xpos = xpos -5
		xpos += xspeed
		ypos+=yspeed
		//ypos = ypos +5
		fill(fillColor)
		circle(xpos,ypos,50)
	}
</script>
</body>
</html>
