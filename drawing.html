	<input type="color" id="colorPicker" value=#ff0000>
	<input type="color" id="bgpicker" value=#000000>



	<script>
		function setup() {
  // Create the canvas
  createCanvas(2000,2000);
 

  // Set width of the lines
  strokeWeight(10);

  // Set color mode to hue-saturation-brightness (HSB)
  //colorMode(HSB);

  // Set screen reader accessible description
  describe('A blank canvas where the user draws by dragging the mouse');
}

function backgroundchange(){
 let bgpicker = document.getElementById("bgpicker")
 bgpicker.addEventListener("click", function()
			{
				background(bgpicker.value)
			})
}

function mouseDragged() {
  // Set the color based on the mouse position, and draw a line
  // from the previous position to the current position
  //let lineHue = mouseX - mouseY;
  //stroke(lineHue, 90, 90);

	let colorPicker = document.getElementById("colorPicker")
	stroke(colorPicker.value)
  line(pmouseX, pmouseY, mouseX, mouseY);

}


	</script>
