<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
</head>
	<style>
		.container {
			display: grid;
			grid-template-columns:1fr 1fr 1fr;
			/*you could also use repeat(4, 1fr)*/
			column-gap:20px;
			row-gap: 20px;
		}
		.item {
			/*border: 1px solid black;*/
			border-radius: 30px;
		}

		.item img {
			border-radius:1000px;
			width:100%;
			height:100%;
			object-fit:contain;
		}

		#fav {
			grid-column:1/3;
			grid-row:1/3;
		}

	</style>
<body>
	<div class ="container">
		<div class="item"><img src="star.png"></div>
		<div class="item" id="fav"><img src="hpjl3.png"></div>
		<div class="item"><img src="star.png"></div>
		<div class="item"><img src="hpjl3.png"></div>
		<div class="item"><img src="star.png"></div>
		<div class="item"><img src="hpjl3.png"></div>
		<div class="item"><img src="star.png"></div>
		<div class="item"><img src="hpjl3.png"></div>
		<div class="item"><img src="star.png"></div>

</html>
