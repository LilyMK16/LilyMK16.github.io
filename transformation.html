<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
</head>
<body>

<script>
	function setup(){
		createCanvas(800,800);

	}

	function draw(){
		background(200)
		push()
		translate(100,100)
		// changes anchor point (0,0) to the corner of the rectange
		//rotate(PI/8)
		rotate(frameCount*0.05)
		rect(0,0,100,50)
		pop()

		push()
		translate(width/2, height/2)
		rotate(frameCount*0.1)
		rect(0,0/2,120,40)
		pop()

		push()
		translate(300,300)
		rotate(frameCount*0.03)
		circle(250-300,250-300,50)
		circle(350-300,250-300,50)
		circle(0,0,100)
		pop()

			}
</script>

</body>
</html>
